<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta http-equiv="Content-Security-Policy"
        content="default-src 'self'; img-src 'self' data:; style-src 'self'; script-src 'self'; connect-src 'self'; font-src 'self'; base-uri 'self'; form-action 'self'; object-src 'none'; frame-ancestors 'none'">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#1a1a1a">
  <title>Mahabharata</title>
  <link rel="stylesheet" href="css/styles.css">
</head>
<body class="gate">
  <main class="gate__card">
    <form class="gate__form" id="gateForm" hidden>
      <input
        type="password"
        class="gate__input"
        id="gateInput"
        autocomplete="current-password"
        autocapitalize="off"
        autocorrect="off"
        spellcheck="false"
        aria-label="Passphrase"
        required>
      <button type="submit" class="gate__submit" id="gateSubmit">Unlock</button>
      <div class="gate__status" id="gateStatus" role="status" aria-live="polite"></div>
    </form>
  </main>
  <script src="js/crypto.js"></script>
  <script src="js/gate.js"></script>
</body>
</html>
